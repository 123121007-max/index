<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday, CA Mohan Krishna</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --gold: #d4af37;
      --gold-soft: #f5deb3;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --card: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.18);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(212,175,55,0.15), transparent 25%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow: hidden;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      position: relative;
      z-index: 2;
      animation: fadeIn 1.2s ease;
    }

    .label {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(212,175,55,0.4);
      color: var(--gold-soft);
      letter-spacing: 0.14em;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 700;
      line-height: 1.08;
      text-shadow: 0 4px 24px rgba(0,0,0,0.25);
    }

    h1 span {
      color: var(--gold);
      display: inline-block;
      animation: glow 2.2s ease-in-out infinite alternate;
    }

    .subtitle {
      margin: 18px auto 0;
      max-width: 580px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .cake {
      font-size: 72px;
      margin: 20px 0 10px;
      animation: float 3s ease-in-out infinite;
    }

    .line {
      width: 120px;
      height: 2px;
      margin: 20px auto;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .wish {
      font-size: clamp(1.15rem, 3vw, 1.6rem);
      color: #fff8dc;
      margin: 0;
      opacity: 0;
      animation: reveal 1.3s ease 1.1s forwards;
    }

    .footer {
      margin-top: 26px;
      font-size: 0.96rem;
      color: #dbeafe;
      opacity: 0.9;
    }

    .sparkle, .confetti {
      position: absolute;
      pointer-events: none;
      z-index: 1;
    }

    .sparkle {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      box-shadow: 0 0 14px rgba(255,255,255,0.8);
      animation: twinkle 3s infinite ease-in-out;
    }

    .confetti {
      top: -20px;
      width: 10px;
      height: 18px;
      opacity: 0.9;
      animation: fall linear infinite;
    }

    .share-note {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255,255,255,0.12);
      color: #e2e8f0;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      z-index: 3;
      backdrop-filter: blur(8px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px rgba(212,175,55,0.2); }
      to { text-shadow: 0 0 18px rgba(212,175,55,0.6); }
    }
    @keyframes reveal {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.4); }
    }
    @keyframes fall {
      from { transform: translateY(-10vh) rotate(0deg); }
      to { transform: translateY(110vh) rotate(540deg); }
    }

    @media (max-width: 560px) {
      .card { padding: 28px 18px; border-radius: 20px; }
      .subtitle { font-size: 0.98rem; }
      .share-note { width: calc(100% - 24px); text-align: center; border-radius: 16px; }
    }
  </style>
</head>
<body>
  <div class="wrap" id="scene">
    <div class="card">
      <div class="label">A Birthday Greeting</div>
      <div class="cake">🎂</div>
      <h1>Happy Birthday,<br><span>CA Mohan Krishna</span></h1>
      <div class="line"></div>
      <p class="wish">Wishing you a year filled with success, happiness, good health, and meaningful moments.</p>
      <p class="subtitle">May this special day bring you well-deserved joy, continued growth, and many memorable celebrations ahead.</p>
      <p class="footer">With warm wishes on your special day.</p>
    </div>

  <script>
    const scene = document.getElementById('scene');

    function makeSparkles(count = 28) {
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.style.left = Math.random() * 100 + 'vw';
        s.style.top = Math.random() * 100 + 'vh';
        s.style.animationDelay = (Math.random() * 3) + 's';
        s.style.animationDuration = (2 + Math.random() * 3) + 's';
        scene.appendChild(s);
      }
    }

    function makeConfetti(count = 42) {
      const shades = ['#d4af37', '#f8fafc', '#93c5fd', '#f5deb3'];
      for (let i = 0; i < count; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = shades[Math.floor(Math.random() * shades.length)];
        c.style.animationDuration = (6 + Math.random() * 6) + 's';
        c.style.animationDelay = (Math.random() * 4) + 's';
        c.style.transform = `rotate(${Math.random() * 360}deg)`;
        c.style.borderRadius = Math.random() > 0.5 ? '2px' : '50%';
        scene.appendChild(c);
      }
    }

    makeSparkles();
    makeConfetti();
  </script>
</body>
</html>
